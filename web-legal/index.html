<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <title>Outstanding Partner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #0d0d0d; color: #c8c4bc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { text-align: center; max-width: 420px; }
    .logo { font-size: 44px; margin-bottom: 16px; }
    h1 { font-family: 'Georgia', serif; font-size: 30px; color: #f0ece4; margin-bottom: 8px; }
    .tag { color: #c0392b; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 24px; }
    p { font-size: 14px; color: #888; line-height: 1.7; margin-bottom: 28px; }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .links a { background: #1a1a1a; border: 1px solid #2a2a2a; color: #f0ece4; text-decoration: none; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 600; }
    .links a:hover { border-color: #c0392b; }
    .foot { margin-top: 32px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧭</div>
    <div class="tag">Lead with Love</div>
    <h1>Outstanding Partner</h1>
    <p>Be the partner she brags about — coming soon to the App Store and Google Play.</p>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/support">Support</a>
    </div>
    <div class="foot">© 2026 Outstanding Partner</div>
  </div>
</body>
</html>
